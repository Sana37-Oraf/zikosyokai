<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sana's Storybook</title>
<style>
body{
  margin:0;
  font-family:"Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  background: linear-gradient(#ffe6f2,#e6f7ff);
  color:#5a4a6b;
  text-align:center;
}

header{
  padding:40px;
  font-size:40px;
  letter-spacing:3px;
}

.card{
  background:white;
  width:70%;
  max-width:600px;
  margin:40px auto;
  padding:30px;
  border-radius:30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  color:#ff7fbf;
}

.star{
  font-size:22px;
}

footer{
  margin-top:50px;
  padding:20px;
  font-size:14px;
  opacity:0.7;
}

button{
  background:#ffb6d9;
  border:none;
  padding:12px 20px;
  border-radius:20px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ffd6ec;
}
</style>
</head>

<body>

<header>
🌸 Sana's Fairy Tale World 🌸
</header>

<div class="card">
<h2>自己紹介</h2>
<p>
はじめまして、紗奈です ✨<br>
メルヘンな世界やかわいいものが好きです。<br>

星や物語、ファンタジーの雰囲気にワクワクします 🌙
</p>
</div>

<div class="card">
<h2>好きなこと</h2>
<p class="star">⭐ イラスト</p>
<p class="star">⭐ 音楽</p>
<p class="star">⭐ ファンタジー</p>
<p class="star">⭐ かわいいデザイン</p>
</div>

<div class="card">
<h2>メッセージ</h2>
<p>
このサイトは、私の小さな物語のページです 📖<br>
来てくれてありがとうございます！
</p>

<button onclick="message()">魔法のボタン ✨</button>
</div>

<footer>
Made with magic by Sana ✨
</footer>

<script>
function message(){
  alert("紗奈のメルヘンワールドへようこそ！🌙✨");
}
</script>

</body>
</html>
