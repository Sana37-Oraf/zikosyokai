<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sana Channel</title>
<style>
body{
  margin:0;
  font-family:"Yu Gothic",sans-serif;
  background:#f9f9f9;
}

header{
  background:#ff7fbf;
  color:white;
  padding:15px 25px;
  font-size:22px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.video-box{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.video{
  width:100%;
  height:360px;
  background:#ddd;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.profile{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#ffd6ec;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

h2{
  text-align:center;
}

.button{
  display:block;
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#ff7fbf;
  color:white;
  cursor:pointer;
}

.list{
  margin-top:20px;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
🎥 Sana Channel
</header>

<div class="container">

<div class="video-box">
<h2>自己紹介動画</h2>

<div class="video">
ここに動画
</div>

<p>
こんにちは、紗奈です 🌸<br>
このページは私の自己紹介チャンネルです。<br>
メルヘンな世界やかわいいものが好きです！
</p>

<button class="button" onclick="hello()">チャンネル登録</button>
</div>

<div class="profile">
<div class="avatar">🌸</div>

<h2>紗奈</h2>

<p>
⭐ 好きなこと<br>
・イラスト<br>
・音楽<br>
・ファンタジー
</p>

<div class="list">
<h3>おすすめ</h3>

<div class="card">自己紹介</div>
<div class="card">好きなもの紹介</div>
<div class="card">メルヘンな世界</div>

</div>

</div>

</div>

<script>
function hello(){
alert("紗奈チャンネルへようこそ！✨");
}
</script>

</body>
</
